name: ZaDarkHelper
options:
  bundleIdPrefix: com.chou.zadarkhelper
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    # Manual signing with a stable self-signed identity so TCC grants
    # (App Management, etc.) survive rebuilds. Run scripts/create-dev-cert.sh
    # once to create "ZaDarkHelperDev" in your login keychain.
    # If the identity is absent, Xcode silently falls back to ad-hoc ("-").
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ZaDarkHelperDev
    DEVELOPMENT_TEAM: ""

targets:
  ZaDarkHelper:
    type: application
    platform: macOS
    sources:
      - path: ZaDarkHelper
        excludes:
          - "Info.plist"
          - "ZaDarkHelper.entitlements"
    resources:
      - ZaDarkHelper/Resources/Assets.xcassets
    info:
      path: ZaDarkHelper/Info.plist
      properties:
        CFBundleName: ZaDarkHelper
        CFBundleDisplayName: ZaDark Helper
        CFBundleShortVersionString: "26.4.004"
        CFBundleVersion: "1"
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "MPL-2.0 — community helper around ZaDark (quaric)."
    entitlements:
      path: ZaDarkHelper/ZaDarkHelper.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chou.zadarkhelper
        MARKETING_VERSION: "26.4.004"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        # Debug dylib + custom identity = team ID mismatch (dylib is ad-hoc, main
        # binary is our ZaDarkHelperDev). Disable it so everything signs consistently.
        ENABLE_DEBUG_DYLIB: NO
        ENABLE_PREVIEWS_DYLIB: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  ZaDarkHelperTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/ZaDarkHelperTests
    dependencies:
      - target: ZaDarkHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chou.zadarkhelper.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ZaDarkHelper.app/Contents/MacOS/ZaDarkHelper"

schemes:
  ZaDarkHelper:
    build:
      targets:
        ZaDarkHelper: all
        ZaDarkHelperTests: [test]
    test:
      targets:
        - ZaDarkHelperTests
    run:
      config: Debug
